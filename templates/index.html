<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PyBot – Learn Python & AI</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #4f8ef7;
      --accent2: #7c5cbf;
      --green: #3dd68c;
      --text: #e2e8f0;
      --muted: #6b7280;
      --user-bg: linear-gradient(135deg, #4f8ef7, #7c5cbf);
      --bot-bg: #1c2030;
      --radius: 16px;
      --font-mono: 'JetBrains Mono', monospace;
      --font-body: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo {
      width: 42px; height: 42px;
      background: var(--user-bg);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 15px rgba(79,142,247,0.3);
    }

    .header-info h1 {
      font-size: 17px; font-weight: 700; color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-info p {
      font-size: 12px; color: var(--green);
      display: flex; align-items: center; gap: 5px;
    }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-tags {
      margin-left: auto;
      display: flex; gap: 8px;
    }

    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--font-mono);
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      max-width: 500px;
      margin: 0 auto;
    }

    .welcome-icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
    }

    .welcome h2 {
      font-size: 22px; font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4f8ef7, #7c5cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      color: var(--muted); font-size: 14px; line-height: 1.6;
      margin-bottom: 24px;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: var(--font-body);
      line-height: 1.4;
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      background: rgba(79,142,247,0.08);
      transform: translateY(-1px);
    }

    .suggestion-btn .icon { font-size: 16px; display: block; margin-bottom: 4px; }

    /* Message bubbles */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 820px;
      width: 100%;
    }

    .msg.user { margin-left: auto; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.bot .avatar { background: var(--surface2); border: 1px solid var(--border); }
    .msg.user .avatar { background: var(--user-bg); }

    .bubble {
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.7;
      max-width: calc(100% - 50px);
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside bubble */
    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: #fff; font-weight: 600; }
    .bubble em { color: #a5b4fc; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 10px; }
    .bubble li { margin-bottom: 4px; }
    .bubble h1, .bubble h2, .bubble h3 {
      color: var(--accent);
      margin-bottom: 8px;
      margin-top: 14px;
      font-size: 15px;
    }

    .bubble pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin: 12px 0;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .bubble code:not(pre code) {
      background: rgba(79,142,247,0.15);
      color: #93c5fd;
      padding: 2px 6px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .input-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      width: 38px; height: 38px;
      background: var(--user-bg);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      font-size: 16px;
    }

    #sendBtn:hover { opacity: 0.85; transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🐍</div>
  <div class="header-info">
    <h1>PyBot</h1>
    <p><span class="status-dot"></span> Online — Ready to teach</p>
  </div>
  <div class="header-tags">
    <span class="tag">Python</span>
    <span class="tag">AI / ML</span>
  </div>
</header>

<div id="messages">
  <div class="welcome">
    <span class="welcome-icon">🤖</span>
    <h2>Hi! I'm PyBot</h2>
    <p>Your personal tutor for Python and Artificial Intelligence. Ask me anything — from basic variables to deep learning!</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this.dataset.q)" data-q="What is a Python list and how do I use it?">
        <span class="icon">📋</span>What is a Python list?
      </button>
      <button class="suggestion-btn" onclick="sendSuggestion(this.dataset.q)" data-q="Explain machine learning to me like I'm a beginner">
        <span class="icon">🧠</span>What is Machine Learning?
      </button>
      <button class="suggestion-btn" onclick="sendSuggestion(this.dataset.q)" data-q="How do I write a for loop in Python? Give me an example">
        <span class="icon">🔄</span>How do I write a for loop?
      </button>
      <button class="suggestion-btn" onclick="sendSuggestion(this.dataset.q)" data-q="What is a neural network and how does it work?">
        <span class="icon">🕸️</span>What is a neural network?
      </button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" rows="1" placeholder="Ask about Python or AI..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <p class="hint">Press Enter to send · Shift+Enter for new line</p>
</div>

<script>
  const messagesDiv = document.getElementById('messages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  let conversationHistory = [];

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(q) {
    userInput.value = q;
    sendMessage();
  }

  function removeWelcome() {
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();
  }

  function appendMessage(role, text) {
    removeWelcome();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'bot') {
      bubble.innerHTML = marked.parse(text);
      bubble.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesDiv.appendChild(wrap);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return wrap;
  }

  function showTyping() {
    removeWelcome();
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing';
    wrap.id = 'typing';
    wrap.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    messagesDiv.appendChild(wrap);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await res.json();
      removeTyping();

      const reply = data.reply;
      appendMessage('bot', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠️ Something went wrong. Make sure Flask is running!');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
